<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Freedom AI | 医学 AI 专家协作门户</title>
    <meta name="description" content="Freedom AI 面向临床、科研、算法、合规与产品转化专家，建设可信、可验证、可转化的医学 AI 专家协作平台。" />
    <meta property="og:title" content="Freedom AI | 医学 AI 专家协作门户" />
    <meta property="og:description" content="面向临床、科研、算法、合规与产品转化专家的医学 AI 专家协作平台。" />
    <meta property="og:image" content="academic-community/assets/images/happy-medical-ai-logo.svg" />
    <link rel="icon" href="academic-community/assets/images/happy-medical-ai-mark.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light;
        --ink: #10202a;
        --muted: #60717f;
        --soft: #7a8c98;
        --panel: rgba(255, 255, 255, 0.82);
        --line: rgba(0, 127, 145, 0.16);
        --primary: #007f91;
        --mint: #5ef2cb;
        --lime: #c7f464;
        --coral: #ff8a5c;
      }

      * { box-sizing: border-box; }

      html { min-height: 100%; }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
        background:
          linear-gradient(rgba(0, 127, 145, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 127, 145, 0.045) 1px, transparent 1px),
          linear-gradient(135deg, #f7fffc 0%, #e8f7ff 48%, #fff4e9 100%);
        background-size: 34px 34px, 34px 34px, auto;
        overflow-x: hidden;
      }

      main {
        min-height: 100vh;
        width: min(100%, 1160px);
        margin: 0 auto;
        padding: 44px 24px 28px;
        display: grid;
        align-items: center;
      }

      .entry {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
        gap: 32px;
        align-items: center;
      }

      .copy {
        position: relative;
        padding: 26px 0;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        padding: 10px 13px 10px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 14px 34px rgba(0, 78, 92, 0.1);
        backdrop-filter: blur(14px);
      }

      .brand img {
        display: block;
        width: 218px;
        max-width: 58vw;
        height: auto;
      }

      .eyebrow {
        width: max-content;
        max-width: 100%;
        margin: 28px 0 14px;
        border: 1px solid rgba(0, 127, 145, 0.16);
        border-radius: 8px;
        padding: 6px 10px;
        color: #075766;
        background: rgba(230, 251, 255, 0.86);
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0;
      }

      h1 {
        max-width: 760px;
        margin: 0 0 16px;
        font-size: clamp(36px, 6vw, 66px);
        line-height: 1.06;
        letter-spacing: 0;
      }

      p {
        max-width: 720px;
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.78;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        margin-top: 30px;
      }

      .portal-link {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        padding: 0 18px;
        color: #05262c;
        text-decoration: none;
        font-weight: 900;
        border: 1px solid rgba(0, 127, 145, 0.18);
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 10px 24px rgba(0, 78, 92, 0.08);
      }

      .portal-link.primary {
        background: linear-gradient(135deg, var(--mint) 0%, var(--lime) 100%);
        border-color: #57d8bd;
      }

      .portal-link:hover {
        transform: translateY(-1px);
        border-color: rgba(0, 127, 145, 0.32);
        box-shadow: 0 14px 28px rgba(0, 78, 92, 0.12);
      }

      .portal-link:focus-visible {
        outline: 3px solid rgba(94, 242, 203, 0.45);
        outline-offset: 4px;
      }

      .status {
        min-height: 24px;
        color: var(--soft);
        font-size: 14px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        width: min(100%, 720px);
        margin-top: 42px;
      }

      .metrics span,
      .side-panel {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 16px 34px rgba(0, 78, 92, 0.08);
        backdrop-filter: blur(14px);
      }

      .metrics span {
        padding: 16px 17px;
      }

      .metrics strong,
      .metrics small {
        display: block;
      }

      .metrics strong {
        color: var(--ink);
        font-size: 18px;
        line-height: 1.35;
      }

      .metrics small {
        margin-top: 5px;
        color: var(--soft);
        font-size: 12px;
      }

      .side-panel {
        padding: 20px;
      }

      .pulse {
        display: grid;
        gap: 12px;
      }

      .pulse span {
        min-height: 70px;
        display: grid;
        align-content: center;
        border: 1px solid rgba(0, 127, 145, 0.12);
        border-radius: 8px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.66);
      }

      .pulse strong {
        color: var(--primary);
        font-size: 24px;
        line-height: 1.1;
      }

      .pulse small {
        color: var(--muted);
        font-size: 13px;
      }

      .accent-line {
        height: 4px;
        margin: 0 0 18px;
        border-radius: 8px;
        background: linear-gradient(90deg, var(--mint), var(--coral));
      }

      @media (max-width: 820px) {
        main { padding: 34px 18px 24px; }
        .entry { grid-template-columns: 1fr; }
        .brand img { width: 190px; }
        .metrics { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="entry" aria-label="Freedom AI 发布入口">
        <div class="copy">
          <a class="brand" href="academic-community/index.html" aria-label="进入 Freedom AI 医学 AI 专家协作门户">
            <img src="academic-community/assets/images/happy-medical-ai-logo.svg" alt="Freedom AI" />
          </a>
          <p class="eyebrow">医学 AI 专家协作门户</p>
          <h1>把临床、科研和 AI 工具放进同一个协作现场</h1>
          <p>面向临床、科研、算法、合规与产品转化专家，沉淀可信、可验证、可转化的医学 AI 共建网络。</p>
          <div class="actions">
            <a id="portalLink" class="portal-link primary" href="academic-community/index.html">进入中文门户</a>
            <a class="portal-link" href="academic-community/en/index.html">进入英文门户</a>
            <div id="portalStatus" class="status" role="status">请选择语言入口。</div>
          </div>
          <div class="metrics" aria-label="平台方向">
            <span><strong>临床</strong><small>真实问题与使用场景</small></span>
            <span><strong>科研</strong><small>论文证据与方法复现</small></span>
            <span><strong>治理</strong><small>合规审查与转化路径</small></span>
          </div>
        </div>
        <aside class="side-panel" aria-label="平台能力概览">
          <div class="accent-line"></div>
          <div class="pulse">
            <span><strong>12+</strong><small>模型与医学工具候选池</small></span>
            <span><strong>72h</strong><small>社区热帖与趋势跟踪周期</small></span>
            <span><strong>8</strong><small>科室方向组织专业讨论</small></span>
          </div>
        </aside>
      </section>
    </main>
  </body>
</html>
