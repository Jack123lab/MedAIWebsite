<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Happy medical AI | 医学 AI 专家协作门户</title>
    <meta name="description" content="Happy medical AI 面向临床、科研、算法、合规与产品转化专家，建设可信、可验证、可转化的医学 AI 专家协作平台。" />
    <meta property="og:title" content="Happy medical AI | 医学 AI 专家协作门户" />
    <meta property="og:description" content="面向临床、科研、算法、合规与产品转化专家的医学 AI 专家协作平台。" />
    <meta property="og:image" content="academic-community/assets/images/happy-medical-ai-logo.svg" />
    <link rel="icon" href="academic-community/assets/images/happy-medical-ai-mark.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #68717d;
        --soft: #7d858f;
        --panel: #ffffff;
        --line: #deded8;
        --yellow: #ffd84d;
        --yellow-dark: #e1b000;
      }

      * { box-sizing: border-box; }

      html { min-height: 100%; }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
        background: #f7f7f4;
        overflow-x: hidden;
      }

      body::before {
        content: none;
      }

      main {
        min-height: 100vh;
        display: grid;
        align-items: center;
        width: min(100%, 1120px);
        margin: 0 auto;
        padding: 56px 24px;
      }

      .entry {
        position: relative;
        max-width: 780px;
        padding: 34px 0 38px;
      }

      .entry::before {
        position: absolute;
        top: 0;
        left: 0;
        width: 82px;
        height: 4px;
        content: "";
        border-radius: 999px;
        background: var(--yellow);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        padding: 10px 14px 10px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .brand img {
        display: block;
        width: 218px;
        max-width: 58vw;
        height: auto;
      }

      .eyebrow {
        margin: 30px 0 14px;
        color: #9a6a00;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        max-width: 760px;
        margin: 0 0 16px;
        font-size: clamp(34px, 6vw, 62px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        max-width: 710px;
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.85;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 14px 18px;
        margin-top: 30px;
      }

      .portal-link {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 6px;
        padding: 0 20px;
        color: #061b24;
        text-decoration: none;
        font-weight: 900;
        background: var(--yellow);
        border: 1px solid var(--yellow-dark);
      }

      .portal-link:focus-visible {
        outline: 3px solid rgba(240, 207, 114, 0.58);
        outline-offset: 4px;
      }

      .status {
        min-height: 24px;
        color: var(--soft);
        font-size: 14px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1px;
        width: min(100%, 680px);
        margin-top: 42px;
        border: 1px solid var(--line);
        background: var(--line);
      }

      .metrics span {
        min-width: 0;
        padding: 16px 18px;
        background: #ffffff;
      }

      .metrics strong,
      .metrics small {
        display: block;
      }

      .metrics strong {
        color: #111827;
        font-size: 18px;
        line-height: 1.35;
      }

      .metrics small {
        margin-top: 5px;
        color: var(--soft);
        font-size: 12px;
      }

      @media (max-width: 680px) {
        main { padding: 34px 18px; }
        .brand img { width: 190px; }
        .metrics { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="entry" aria-label="Happy medical AI 发布入口">
        <a class="brand" href="academic-community/index.html" aria-label="进入 Happy medical AI 医学 AI 专家协作门户">
          <img src="academic-community/assets/images/happy-medical-ai-logo.svg" alt="Happy medical AI" />
        </a>
        <p class="eyebrow">医学 AI 专家门户</p>
        <h1>医学 AI 专家协作门户</h1>
        <p>面向临床、科研、算法、合规与产品转化专家，沉淀可信、可验证、可转化的医学 AI 共建网络。</p>
        <div class="actions">
          <a id="portalLink" class="portal-link" href="academic-community/index.html">进入中文门户</a>
          <a class="portal-link" href="academic-community/en/index.html">进入英文门户</a>
          <div id="portalStatus" class="status" role="status">请选择语言入口。</div>
        </div>
        <div class="metrics" aria-label="平台方向">
          <span><strong>临床</strong><small>真实问题与使用场景</small></span>
          <span><strong>科研</strong><small>论文证据与方法复现</small></span>
          <span><strong>治理</strong><small>合规审查与转化路径</small></span>
        </div>
      </section>
    </main>
  </body>
</html>
