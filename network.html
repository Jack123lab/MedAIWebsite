<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>医学社区与讨论区 | Freedom AI</title>
    <meta name="description" content="Freedom AI 医学社区与讨论区统一入口。" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/main.js" defer></script>
    <script src="assets/js/language-switch.js" defer></script>
    <style>
      .community-entry-page {
        background: #f6faf8;
      }

      .community-entry-page .site-header {
        background: rgba(246, 250, 248, 0.92);
        backdrop-filter: blur(14px);
      }

      .community-entry-main {
        min-height: calc(100dvh - 82px);
        display: flex;
        align-items: center;
        padding: 56px 0;
      }

      .community-entry-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 26px;
      }

      .community-entry-card {
        min-height: 430px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        padding: 36px;
        border: 1px solid rgba(13, 88, 82, 0.14);
        border-radius: 8px;
        background: #ffffff;
        color: #12201e;
        text-decoration: none;
        box-shadow: 0 20px 54px rgba(28, 54, 50, 0.09);
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .community-entry-card:hover,
      .community-entry-card:focus-visible {
        transform: translateY(-4px);
        border-color: rgba(15, 118, 110, 0.42);
        box-shadow: 0 26px 68px rgba(28, 54, 50, 0.14);
        outline: none;
      }

      .community-entry-card:active {
        transform: translateY(-1px);
      }

      .community-entry-image {
        width: min(74%, 310px);
        aspect-ratio: 1;
        object-fit: contain;
        display: block;
      }

      .community-entry-title {
        margin: 0;
        color: #10201f;
        font-size: clamp(1.85rem, 3vw, 2.55rem);
        line-height: 1.12;
        letter-spacing: 0;
        font-weight: 800;
      }

      @media (max-width: 820px) {
        .community-entry-main {
          min-height: auto;
          padding: 34px 0;
        }

        .community-entry-grid {
          grid-template-columns: 1fr;
          gap: 18px;
        }

        .community-entry-card {
          min-height: 300px;
          gap: 20px;
          padding: 28px;
        }

        .community-entry-image {
          width: min(72%, 230px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .community-entry-card {
          transition: none;
        }

        .community-entry-card:hover,
        .community-entry-card:focus-visible,
        .community-entry-card:active {
          transform: none;
        }
      }
    </style>
  </head>
  <body class="community-entry-page">
    <header class="site-header">
      <nav class="nav" aria-label="主导航">
        <a class="brand" href="index.html"><span class="brand-mark">F</span><span class="brand-text"><strong>Freedom AI</strong><span>医学 AI 社区</span></span></a>
        <form class="site-search" role="search" action="search.html" method="get" aria-label="站内搜索">
          <label class="sr-only" for="siteSearchInput">搜索</label>
          <input id="siteSearchInput" name="q" type="search" placeholder="搜索" autocomplete="off" />
          <button type="submit">搜索</button>
        </form>
        <div class="nav-links">
          <a href="index.html">首页</a>
          <a href="learning.html">内容</a>
          <a class="active" href="network.html">社区</a>
          <div class="nav-dropdown nav-column-dropdown">
            <button class="nav-fold-title" type="button" aria-haspopup="true"><span>专栏</span><span class="nav-arrow" aria-hidden="true"></span></button>
            <div class="nav-dept-menu nav-column-menu" role="menu" aria-label="专栏">
              <a href="datasets-tools.html" role="menuitem">资源索引</a>
              <a href="datasets.html" role="menuitem">数据集</a>
              <a href="tools.html" role="menuitem">工具栏</a>
              <a href="benchmark.html" role="menuitem">评测</a>
              <a href="research.html" role="menuitem">论文</a>
              <a href="community.html#model-discussion" role="menuitem">模型</a>
            </div>
          </div>
          <a href="crowdsourcing.html">众包</a>
          <a href="blog.html">博客</a>
          <a href="profile.html">用户</a>
        </div>
        <div class="language-switch home-language-switch" data-language-switch aria-label="Language">
          <button class="language-trigger" type="button" data-language-trigger aria-haspopup="listbox" aria-expanded="false">
            <span class="language-trigger-icon" aria-hidden="true">文</span>
            <span data-language-current>中文</span>
            <span class="language-trigger-caret" aria-hidden="true">⌄</span>
          </button>
          <div class="language-menu" data-language-menu role="listbox" aria-label="Language list" hidden></div>
        </div>
      </nav>
    </header>

    <main class="community-entry-main">
      <h1 class="sr-only">医学社区与讨论区</h1>
      <div class="container">
        <div class="community-entry-grid" aria-label="社区入口">
          <a class="community-entry-card" href="medical-community.html" aria-label="进入医学社区">
            <img class="community-entry-image" src="assets/images/community-doctor-logo.png" alt="医生标志" />
            <h2 class="community-entry-title">医学社区</h2>
          </a>
          <a class="community-entry-card" href="community.html" aria-label="进入讨论区">
            <img class="community-entry-image" src="assets/images/community-discussion-ai-cross.png" alt="AI 和医学十字讨论图" />
            <h2 class="community-entry-title">讨论区</h2>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
